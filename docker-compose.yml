services:

  redis:
    image: redis:7-alpine
    container_name: grpc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: grpc_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: grpcdata
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    command: python server.py
    container_name: grpc_server
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      REDIS_HOST: redis
      GRPC_PORT: "50051"
      MAX_WORKERS: "50"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python worker.py
    container_name: grpc_worker
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      MONGO_HOST: mongodb
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-changeme}
      CONSUMER_NAME: worker-1
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  mongo-express:
    image: mongo-express:1.0.2
    container_name: grpc_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: grpc_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-mongodb-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  redis_data:
  mongo_data:
  grafana_data:
