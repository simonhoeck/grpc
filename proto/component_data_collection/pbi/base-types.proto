// Represents a percentage, with values constrained between 0 and 100.
message Percentage {
  double value = 1 [
    (besi.opts.v1_0_0.field).range.min = 0,
    (besi.opts.v1_0_0.field).range.max = 100
  ]; // The percentage value, must be between 0% and 100%.
}

// A collection of percentage values, each constrained between 0 and 100.
message PercentageBag {
  repeated double values = 1 [
    (besi.opts.v1_0_0.field).range.min = 0,
    (besi.opts.v1_0_0.field).range.max = 100
  ]; // List of percentage values, each must be between 0% and 100%.
}