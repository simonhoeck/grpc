}

// Represents a three-dimensional position measured in meters.
message Position3d {
  double x = 1; // The position value along the X-axis in meters.
  double y = 2; // The position value along the Y-axis in meters.
  double z = 3; // The position value along the Z-axis in meters.
  option (besi.opts.v1_0_0.msg).unit.type = meter;
