syntax = "proto3";

import "google/protobuf/descriptor.proto";
import "base-options.proto";

package besi.types.v1_0_0;

extend google.protobuf.EnumValueOptions {
  string stringName = 50000;
}

// Side represents the gantry side on the equipment.
enum Side {
  // The side is not defined or not applicable.
  unknown_side = 0 [(stringName) = "Not set"];

  // left represents the left gantry of the equipment.
  left = 1 [(stringName) = "Left"];

  // right represents the left gantry of the equipment.
  right = 2 [(stringName) = "Right"];
}

// Represents a one-dimensional offset measured in meters.
message Offset1d {
  double value = 1; // The offset value in meters.
  option (besi.opts.v1_0_0.msg).unit.type = meter;
  option (besi.opts.v1_0_0.msg).unit.prefix = base;
}

// A collection of one-dimensional offset values measured in meters.
message Offset1dBag {
  repeated double values = 1; // List of offset values in meters.
  option (besi.opts.v1_0_0.msg).unit.type = meter;
  option (besi.opts.v1_0_0.msg).unit.prefix = base;
}

// Represents a two-dimensional offset measured in meters.
message Offset2d {
  double x = 1; // The offset value along the X-axis in meters.
  double y = 2; // The offset value along the Y-axis in meters.
  option (besi.opts.v1_0_0.msg).unit.type = meter;
  option (besi.opts.v1_0_0.msg).unit.prefix = base;
}

// A collection of two-dimensional offsets measured in meters.
message Offset2dBag {
  repeated Offset2d values = 1; // List of two-dimensional offset values.
}

// Represents a three-dimensional offset measured in meters.
message Offset3d {
  double x = 1; // The offset value along the X-axis in meters.
  double y = 2; // The offset value along the Y-axis in meters.
  double z = 3; // The offset value along the Z-axis in meters.
  option (besi.opts.v1_0_0.msg).unit.type = meter;
  option (besi.opts.v1_0_0.msg).unit.prefix = base;
}

// A collection of three-dimensional offsets measured in meters.
message Offset3dBags {
  repeated Offset3d values = 1; // List of three-dimensional offset values.
}

// Represents a one-dimensional position measured in meters.
message Position1d {
  double value = 1; // The position value in meters.
  option (besi.opts.v1_0_0.msg).unit.type = meter;
  option (besi.opts.v1_0_0.msg).unit.prefix = base;
}

// A collection of one-dimensional position values measured in meters.
message Position1dBag {
