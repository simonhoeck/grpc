syntax = "proto3";

package data;

message DataPacket {
  string type      = 1;  // "sensor", "event", "binary"
  int64  timestamp = 2;  // Unix epoch milliseconds
  string device_id = 3;
  bytes  payload   = 4;  // JSON for sensor/event; raw bytes for binary
}

message Ack {
  bool success = 1;
}

service DataService {
  rpc SendData(stream DataPacket) returns (Ack);
}
